{% extends "base.html" %} 
{% load static %} 
{% load crispy_forms_tags %} 
{% block content %}

<div class="container mt-4">
  <div class="card game-form-card">
    <div class="card-body">
      <h2>Edit Game Details:{{ game.title }}</h2>
      <p class="text-muted">
        Editing this game will resubmit it for admin approval before it
        reappears in the catalogue.
      </p>
      <form method="post">
        {% csrf_token %} {{ form|crispy }}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-gold">Save Changes</button>
          <a
            href="{% url 'game_detail' boardgame.slug %}"
            class="btn btn-secondary"
            >Cancel</a
          >
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
