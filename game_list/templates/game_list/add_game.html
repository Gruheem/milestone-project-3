{% extends "base.html" %} 
{% load static %} 
{% load crispy_forms_tags %} 
{% block content %}

<div class="container mt-4">
  <div class="card game-form-card">
    <div class="card-body">
      <h2>Enter Game Details For Submission:</h2>
      <p class="text-muted">
        Your submission will be reviewed before appearing in the catalogue.
      </p>
      <form method="post">
        {% csrf_token %} {{ form|crispy }}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-gold">Submit Game</button>
          <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
